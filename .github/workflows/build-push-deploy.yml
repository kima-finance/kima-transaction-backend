name: Build, push to ECR and deploy to ECS

on:
  push:
    branches:
      - main
      - testnet
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment target for manual deployment'
        required: true
        type: choice
        options:
          - staging
          - testnet
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC auth to AWS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Resolve the environment prefix from the branch name so we can select
      # the right prefixed secrets/variables (e.g. TESTNET_AWS_ROLE_ARN)
      - name: Resolve environment prefix
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "prefix=PRODUCTION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/testnet" ]]; then
            echo "prefix=TESTNET" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "prefix=STAGING" >> $GITHUB_OUTPUT
          else
            # manual workflow_dispatch
            INPUT="${{ github.event.inputs.environment }}"
            echo "prefix=${INPUT^^}" >> $GITHUB_OUTPUT
          fi

      # Exchange the GitHub OIDC token for temporary AWS credentials — no stored keys needed
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.env.outputs.prefix == 'TESTNET' && secrets.TESTNET_AWS_ROLE_ARN || steps.env.outputs.prefix == 'STAGING' && secrets.STAGING_AWS_ROLE_ARN || secrets.PRODUCTION_AWS_ROLE_ARN }}
          aws-region: ${{ steps.env.outputs.prefix == 'TESTNET' && vars.TESTNET_AWS_REGION || steps.env.outputs.prefix == 'STAGING' && vars.STAGING_AWS_REGION || vars.PRODUCTION_AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Resolve remaining env-specific variables into a single output for reuse
      - name: Resolve environment variables
        id: cfg
        run: |
          PREFIX="${{ steps.env.outputs.prefix }}"
          if [[ "$PREFIX" == "TESTNET" ]]; then
            echo "ecr_repo=${{ vars.TESTNET_ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
            echo "ecs_cluster=${{ vars.TESTNET_ECS_CLUSTER }}" >> $GITHUB_OUTPUT
            echo "ecs_service=${{ vars.TESTNET_ECS_SERVICE }}" >> $GITHUB_OUTPUT
            echo "ecs_task_def=${{ vars.TESTNET_ECS_TASK_DEFINITION }}" >> $GITHUB_OUTPUT
          elif [[ "$PREFIX" == "STAGING" ]]; then
            echo "ecr_repo=${{ vars.STAGING_ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
            echo "ecs_cluster=${{ vars.STAGING_ECS_CLUSTER }}" >> $GITHUB_OUTPUT
            echo "ecs_service=${{ vars.STAGING_ECS_SERVICE }}" >> $GITHUB_OUTPUT
            echo "ecs_task_def=${{ vars.STAGING_ECS_TASK_DEFINITION }}" >> $GITHUB_OUTPUT
          else
            echo "ecr_repo=${{ vars.PRODUCTION_ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
            echo "ecs_cluster=${{ vars.PRODUCTION_ECS_CLUSTER }}" >> $GITHUB_OUTPUT
            echo "ecs_service=${{ vars.PRODUCTION_ECS_SERVICE }}" >> $GITHUB_OUTPUT
            echo "ecs_task_def=${{ vars.PRODUCTION_ECS_TASK_DEFINITION }}" >> $GITHUB_OUTPUT
          fi

      # Parse the env-file secret into a cleaned KEY=VALUE list for injection into the ECS task definition.
      # Secrets are passed via env vars (masked) rather than inline expressions for safe handling.
      - name: Fetch env file and parse for ECS
        id: envfile
        env:
          TESTNET_ENV: ${{ secrets.TESTNET_ENV_FILE }}
          STAGING_ENV: ${{ secrets.STAGING_ENV_FILE }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          PREFIX="${{ steps.env.outputs.prefix }}"
          if [[ "$PREFIX" == "TESTNET" ]]; then
            printf '%s' "$TESTNET_ENV" > .env
          elif [[ "$PREFIX" == "STAGING" ]]; then
            printf '%s' "$STAGING_ENV" > .env
          else
            printf '%s' "$PRODUCTION_ENV" > .env
          fi
          # Normalize line endings, strip comment/blank lines, strip surrounding quotes from values
          CLEAN=$(tr -d '\r' < .env | grep -v '^\s*#' | grep -v '^\s*$' | grep '=' | \
            sed "s/='\(.*\)'\s*$/=\1/" | sed 's/="\(.*\)"\s*$/=\1/' | sed 's/\s*$//')
          {
            echo "env_vars<<EOF"
            echo "$CLEAN"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image to ECR
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # ECS Fargate (x86) only — single platform keeps build fast
          platforms: linux/amd64
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ steps.cfg.outputs.ecr_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pull the current task definition JSON and update only the app container image
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ steps.cfg.outputs.ecs_task_def }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ steps.ecr-login.outputs.registry }}/${{ steps.cfg.outputs.ecr_repo }}:latest
          environment-variables: ${{ steps.envfile.outputs.env_vars }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ steps.cfg.outputs.ecs_service }}
          cluster: ${{ steps.cfg.outputs.ecs_cluster }}
          wait-for-service-stability: true
