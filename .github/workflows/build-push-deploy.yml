name: Build, push to ECR and deploy to ECS

on:
  push:
    branches:
      - main
      - testnet
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment target for manual deployment'
        required: true
        type: choice
        options:
          - staging
          - testnet
          - mainnet

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC auth to AWS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Resolve environment name and secret prefix from branch
      - name: Resolve environment
        id: env
        run: |
          case "${{ github.ref }}" in
            refs/heads/main)     ENV=mainnet;  PREFIX=MAINNET ;;
            refs/heads/testnet)  ENV=testnet;  PREFIX=TESTNET ;;
            refs/heads/staging)  ENV=staging;  PREFIX=STAGING ;;
            *)
              # manual workflow_dispatch
              INPUT="${{ github.event.inputs.environment }}"
              PREFIX="${INPUT^^}"
              if [[ "$PREFIX" == "MAINNET" ]]; then ENV=mainnet; else ENV="${INPUT}"; fi
              ;;
          esac
          REPO="${{ github.event.repository.name }}"
          echo "env=$ENV"                      >> $GITHUB_OUTPUT
          echo "prefix=$PREFIX"                >> $GITHUB_OUTPUT
          echo "ecr_repo=${REPO}-${ENV}"       >> $GITHUB_OUTPUT
          echo "ecs_cluster=kima-${ENV}"       >> $GITHUB_OUTPUT
          echo "ecs_service=${REPO}-${ENV}"    >> $GITHUB_OUTPUT
          echo "ecs_task_def=${REPO}-${ENV}"   >> $GITHUB_OUTPUT

      # Exchange the GitHub OIDC token for temporary AWS credentials — no stored keys needed
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.env.outputs.prefix == 'TESTNET' && secrets.TESTNET_AWS_ROLE_ARN || steps.env.outputs.prefix == 'STAGING' && secrets.STAGING_AWS_ROLE_ARN || secrets.MAINNET_AWS_ROLE_ARN }}
          aws-region: ${{ steps.env.outputs.prefix == 'TESTNET' && vars.TESTNET_AWS_REGION || steps.env.outputs.prefix == 'STAGING' && vars.STAGING_AWS_REGION || vars.MAINNET_AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ steps.env.outputs.ecr_repo }}" \
            --region "${{ steps.env.outputs.prefix == 'TESTNET' && vars.TESTNET_AWS_REGION || steps.env.outputs.prefix == 'STAGING' && vars.STAGING_AWS_REGION || vars.MAINNET_AWS_REGION }}" \
            > /dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${{ steps.env.outputs.ecr_repo }}" \
            --image-scanning-configuration scanOnPush=true \
            --region "${{ steps.env.outputs.prefix == 'TESTNET' && vars.TESTNET_AWS_REGION || steps.env.outputs.prefix == 'STAGING' && vars.STAGING_AWS_REGION || vars.MAINNET_AWS_REGION }}"

      # Parse the env-file secret into a cleaned KEY=VALUE list for injection into the ECS task definition.
      # Secrets are passed via env vars (masked) rather than inline expressions for safe handling.
      - name: Fetch env file and parse for ECS
        id: envfile
        env:
          TESTNET_ENV: ${{ secrets.TESTNET_ENV_FILE }}
          STAGING_ENV: ${{ secrets.STAGING_ENV_FILE }}
          MAINNET_ENV: ${{ secrets.MAINNET_ENV_FILE }}
        run: |
          PREFIX="${{ steps.env.outputs.prefix }}"
          case "$PREFIX" in
            TESTNET)    printf '%s' "$TESTNET_ENV" > .env ;;
            STAGING)    printf '%s' "$STAGING_ENV" > .env ;;
            MAINNET) printf '%s' "$MAINNET_ENV" > .env ;;
          esac
          # Normalize line endings, strip comment/blank lines, strip surrounding quotes from values
          CLEAN=$(tr -d '\r' < .env | grep -v '^\s*#' | grep -v '^\s*$' | grep '=' | \
            sed "s/='\(.*\)'\s*$/=\1/" | sed 's/="\(.*\)"\s*$/=\1/' | sed 's/\s*$//')
          {
            echo "env_vars<<EOF"
            echo "$CLEAN"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image to ECR
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # ECS Fargate (x86) only — single platform keeps build fast
          platforms: linux/amd64
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ steps.env.outputs.ecr_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pull the current task definition JSON and update only the app container image
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ steps.env.outputs.ecs_task_def }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ steps.ecr-login.outputs.registry }}/${{ steps.env.outputs.ecr_repo }}:latest
          environment-variables: ${{ steps.envfile.outputs.env_vars }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ steps.env.outputs.ecs_service }}
          cluster: ${{ steps.env.outputs.ecs_cluster }}
          wait-for-service-stability: true
