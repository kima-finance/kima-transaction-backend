name: Build, push to ECR and deploy to ECS

on:
  push:
    branches:
      - main
      - testnet
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - staging
          - testnet
          - mainnet

jobs:
  # Resolves the target environment from the branch name or manual input.
  # A separate job is required because `environment:` is evaluated before any
  # steps run, so it cannot be set dynamically within a single job.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve environment
        id: resolve
        run: |
          case "${{ github.ref }}" in
            refs/heads/main)    echo "environment=mainnet"  >> $GITHUB_OUTPUT ;;
            refs/heads/testnet) echo "environment=testnet"  >> $GITHUB_OUTPUT ;;
            refs/heads/staging) echo "environment=staging"  >> $GITHUB_OUTPUT ;;
            *)                  echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT ;;
          esac

  build-and-deploy:
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    permissions:
      contents: read
      id-token: write  # required for OIDC auth to AWS
    env:
      ENV: ${{ needs.resolve.outputs.environment }}
      REPO: ${{ github.event.repository.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Exchange the GitHub OIDC token for temporary AWS credentials — no stored keys needed.
      # AWS_ROLE_ARN and AWS_REGION are resolved from the GitHub Environment declared above.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Idempotent — succeeds whether the repository already exists or is newly created.
      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository \
            --repository-name "$REPO-$ENV" \
            --image-scanning-configuration scanOnPush=true \
            2>&1 || true

      # ENV_FILE is passed via env var (masked by GitHub) rather than inline
      # to prevent the secret value appearing in the workflow expression log.
      - name: Parse env file for ECS
        id: envfile
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          # Normalize line endings, strip comments/blanks, strip surrounding quotes
          CLEAN=$(tr -d '\r' < .env \
            | grep -v '^\s*#' \
            | grep -v '^\s*$' \
            | grep '=' \
            | sed "s/='\(.*\)'\s*$/=\1/" \
            | sed 's/="\(.*\)"\s*$/=\1/' \
            | sed 's/\s*$//')
          {
            echo "env_vars<<EOF"
            echo "$CLEAN"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image to ECR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64  # ECS Fargate (x86) only — single platform keeps build fast
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ env.REPO }}-${{ env.ENV }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fetch the live task definition so we only update the image — all other
      # settings (secrets, sidecar config) are preserved as-is from ECS.
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$REPO-$ENV" \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.REPO }}-${{ env.ENV }}:latest
          environment-variables: ${{ steps.envfile.outputs.env_vars }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.REPO }}-${{ env.ENV }}
          cluster: kima-${{ env.ENV }}
          wait-for-service-stability: true
